name: Trivy Security Report

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday

permissions:
  contents: write
  security-events: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/vibhuvioio/openldap:latest
          format: template
          template: '@contrib/html.tpl'
          output: trivy-report.html

      - name: Generate markdown report
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/vibhuvioio/openldap:latest
          format: template
          template: '@contrib/markdown.tpl'
          output: SECURITY.md

      - name: Commit report
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add SECURITY.md trivy-report.html
          git diff --quiet && git diff --staged --quiet || git commit -m "Update Trivy security report"
          git push
