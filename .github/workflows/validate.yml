name: Validate

# Trigger on Pull Request - blocks merge if validation fails
on:
  pull_request:
    branches: [ main ]
    paths:
      - 'Dockerfile'
      - 'startup.sh'
      - 'scripts/**'
      - 'ldif/**'

jobs:
  # 1. Lint Dockerfile
  lint-dockerfile:
    name: Lint Dockerfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ./Dockerfile
          verbose: true
          config: .hadolint.yml

  # 2. Lint Shell Scripts
  lint-scripts:
    name: Lint Shell Scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './scripts'
          format: gcc

  # 3. Build and Test Container
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: [lint-dockerfile, lint-scripts]
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: openldap:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Start container
        run: |
          docker run -d \
            --name openldap-test \
            -e LDAP_DOMAIN=test.com \
            -e LDAP_ADMIN_PASSWORD=testpass \
            -p 389:389 \
            openldap:test
          
          # Wait for LDAP to be ready (up to 2 minutes)
          echo "Waiting for LDAP to start..."
          for i in {1..60}; do
            if docker exec openldap-test ldapsearch -x -H ldap://localhost:389 -b "" -s base 2>/dev/null | grep -q "OpenLDAProotDSE"; then
              echo "✅ LDAP is responding (attempt $i)"
              exit 0
            fi
            echo "Attempt $i/60..."
            sleep 2
          done
          echo "❌ LDAP failed to start"
          docker logs openldap-test
          exit 1
      
      - name: Test LDAP connection
        run: |
          # Test basic connectivity (anonymous bind)
          echo "Testing LDAP basic connectivity..."
          docker exec openldap-test /usr/local/bin/scripts/test-basic.sh localhost 389
          echo "✅ LDAP connection successful"
      
      - name: Test ACL enforcement
        run: |
          # Test that anonymous users cannot read user entries
          echo "Testing ACL enforcement..."
          docker exec openldap-test /usr/local/bin/scripts/test-acl.sh
          echo "✅ ACL enforcement verified"
      
      - name: Check logs on failure
        if: failure()
        run: docker logs openldap-test
      
      - name: Cleanup
        if: always()
        run: docker rm -f openldap-test

  # 4. Security Scan
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4
      
      - name: Build image
        run: docker build -t openldap:scan .
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'openldap:scan'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
      
      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # 5. Test Overlay Features
  test-overlays:
    name: Test Overlay Features
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4
      
      - name: Build image
        run: docker build -t openldap:overlay-test .
      
      - name: Test memberOf, ppolicy, auditlog
        run: |
          cd use-cases/overlay-features
          
          # Update compose to use local image
          sed -i 's|image: ghcr.io/vibhuvioio/openldap:latest|image: openldap:overlay-test|' docker-compose.yml
          
          # Start and test
          docker-compose up -d
          
          # Wait for init script to complete
          echo "Waiting for initialization..."
          sleep 15
          
          # Check logs for test results
          docker logs openldap-overlays 2>&1 | tee /tmp/overlay-logs.txt
          
          # Verify all tests passed
          if grep -q "✗ FAIL" /tmp/overlay-logs.txt; then
            echo "❌ Overlay tests failed"
            exit 1
          fi
          
          if ! grep -q "All overlay tests PASSED" /tmp/overlay-logs.txt; then
            echo "❌ Overlay tests did not complete"
            exit 1
          fi
          
          echo "✅ Overlay features working"
      
      - name: Cleanup
        if: always()
        run: cd use-cases/overlay-features && docker-compose down -v

  # 6. Test TLS
  test-tls:
    name: Test TLS
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4
      
      - name: Build image
        run: docker build -t openldap:tls-test .
      
      - name: Test TLS connectivity
        run: |
          cd use-cases/tls-enabled
          
          # Update compose to use local image
          sed -i 's|image: ghcr.io/vibhuvioio/openldap:latest|image: openldap:tls-test|' docker-compose.yml
          
          # Start
          docker-compose up -d
          
          # Wait for LDAP
          echo "Waiting for LDAP..."
          sleep 10
          
          # Test StartTLS
          echo "Testing StartTLS..."
          if docker exec openldap-tls ldapsearch -x -H ldap://localhost:389 -ZZ \
            -D "cn=Manager,dc=example,dc=com" -w "AdminPass123!" \
            -b "dc=example,dc=com" -s base 2>&1 | grep -q "dn:"; then
            echo "✅ StartTLS working"
          else
            echo "❌ StartTLS failed"
            docker logs openldap-tls
            exit 1
          fi
          
          # Test LDAPS
          echo "Testing LDAPS..."
          if LDAPTLS_REQCERT=never docker exec openldap-tls ldapsearch -x -H ldaps://localhost:636 \
            -D "cn=Manager,dc=example,dc=com" -w "AdminPass123!" \
            -b "dc=example,dc=com" -s base 2>&1 | grep -q "dn:"; then
            echo "✅ LDAPS working"
          else
            echo "❌ LDAPS failed"
            exit 1
          fi
      
      - name: Cleanup
        if: always()
        run: cd use-cases/tls-enabled && docker-compose down -v

  # 7. Test Idempotency
  test-idempotency:
    name: Test Idempotency
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4
      
      - name: Build image
        run: docker build -t openldap:idempotency-test .
      
      - name: Test restart idempotency
        run: |
          cd use-cases/idempotency-test
          
          # Update compose to use local image
          sed -i 's|image: ghcr.io/vibhuvioio/openldap:latest|image: openldap:idempotency-test|' docker-compose.yml
          
          # First start
          echo "=== First start ==="
          docker-compose up -d
          sleep 15
          
          # Get initial entry count
          INITIAL_COUNT=$(docker exec openldap-idempotency ldapsearch -x \
            -D "cn=Manager,dc=example,dc=com" -w "AdminPass123!" \
            -b "dc=example,dc=com" "(objectClass=*)" 2>/dev/null | grep -c "^dn:" || echo "0")
          echo "Initial entries: $INITIAL_COUNT"
          
          if [ "$INITIAL_COUNT" -lt 3 ]; then
            echo "❌ Initial data not created"
            docker logs openldap-idempotency
            exit 1
          fi
          
          # Restart
          echo "=== Restarting container ==="
          docker-compose restart
          sleep 15
          
          # Check for errors
          if docker logs openldap-idempotency 2>&1 | grep -iE "(error|fail|already exists)" | grep -v "already configured\|already exists"; then
            echo "❌ Errors during restart"
            exit 1
          fi
          
          # Verify data persistence
          SECOND_COUNT=$(docker exec openldap-idempotency ldapsearch -x \
            -D "cn=Manager,dc=example,dc=com" -w "AdminPass123!" \
            -b "dc=example,dc=com" "(objectClass=*)" 2>/dev/null | grep -c "^dn:" || echo "0")
          echo "Entries after restart: $SECOND_COUNT"
          
          if [ "$INITIAL_COUNT" -ne "$SECOND_COUNT" ]; then
            echo "❌ Entry count changed: $INITIAL_COUNT -> $SECOND_COUNT"
            exit 1
          fi
          
          echo "✅ Idempotency verified"
      
      - name: Cleanup
        if: always()
        run: cd use-cases/idempotency-test && docker-compose down -v

  # 8. Check Image Size
  check-size:
    name: Check Image Size
    runs-on: ubuntu-latest
    needs: [build-test, test-overlays, test-tls, test-idempotency]
    steps:
      - uses: actions/checkout@v4
      
      - name: Build image
        run: docker build -t openldap:size-check .
      
      - name: Check size
        run: |
          SIZE=$(docker images openldap:size-check --format "{{.Size}}")
          echo "Image size: $SIZE"
          if echo "$SIZE" | grep -qE "^[0-9.]+GB"; then
            echo "❌ Image size too large"
            exit 1
          fi
          echo "✅ Size OK"
