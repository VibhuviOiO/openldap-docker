name: Publish OpenLDAP

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  version:
    name: Read OpenLDAP Version
    runs-on: ubuntu-latest
    outputs:
      openldap-version: ${{ steps.version.outputs.openldap-version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read VERSION file
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "openldap-version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "OpenLDAP version: ${VERSION}"

  publish:
    name: Build & Push
    needs: version
    uses: VibhuviOiO/github-engineering/.github/workflows/container-publish.yml@main
    with:
      image-name: openldap
      platforms: linux/amd64,linux/arm64
      ghcr-enabled: true
      dockerhub-enabled: true
      build-args: |
        OPENLDAP_VERSION=${{ needs.version.outputs.openldap-version }}
      tags: |
        type=raw,value=latest
        type=raw,value=${{ needs.version.outputs.openldap-version }}
        type=semver,pattern={{version}}
        type=sha,prefix=
    secrets: inherit
