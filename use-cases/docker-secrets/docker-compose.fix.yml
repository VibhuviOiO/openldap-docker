services:
  openldap:
    image: ghcr.io/vibhuvioio/openldap:latest
    container_name: openldap-secrets
    hostname: openldap-secrets
    environment:
      - LDAP_DOMAIN=example.com
      - LDAP_ADMIN_PASSWORD_FILE=/run/secrets/ldap_admin_password
      - LDAP_CONFIG_PASSWORD_FILE=/run/secrets/ldap_config_password
      - LDAP_ORGANIZATION=Example Organization (Docker Secrets)
      - ENABLE_MONITORING=true
      - ENABLE_MEMBEROF=false
    ports:
      - "389:389"
      - "636:636"
    volumes:
      - ldap-data:/var/lib/ldap
      - ldap-config:/etc/openldap/slapd.d
      - ./logs:/logs
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - SETUID
      - SETGID
      - CHOWN
    stop_grace_period: 30s
    secrets:
      - ldap_admin_password
      - ldap_config_password
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # Fix for permission issue - run as root longer
    user: root
    entrypoint: ["/bin/bash", "-c", "mkdir -p /tmp/ldap-init/ldif && chown -R ldap:ldap /tmp/ldap-init && chmod 755 /tmp/ldap-init && exec /usr/local/bin/startup.sh"]

volumes:
  ldap-data:
  ldap-config:

secrets:
  ldap_admin_password:
    file: ./secrets/admin_password.txt
  ldap_config_password:
    file: ./secrets/config_password.txt
